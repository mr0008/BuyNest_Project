<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – BuyNest</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">Buy<span>Nest</span></div>
    <p class="auth-subtitle">Sign in to your account</p>

    <div id="auth-error" class="auth-error hidden"></div>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Sign In
      </button>
    </form>

    <div style="display:flex;align-items:center;gap:10px;margin:18px 0 8px;color:var(--text-muted);font-size:.9rem;">
      <span style="flex:1;height:1px;background:rgba(148,163,184,.35)"></span>
      <span>or</span>
      <span style="flex:1;height:1px;background:rgba(148,163,184,.35)"></span>
    </div>

    <button id="gmail-login-btn" type="button" class="btn btn-full btn-lg"
            style="display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#111827;border:1px solid #d0d5dd;box-shadow:0 6px 18px rgba(15,23,42,.08)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21.6 12.23c0-.79-.07-1.54-.2-2.27H12v4.3h5.38a4.6 4.6 0 0 1-2 3.02v2.5h3.24c1.9-1.75 2.98-4.33 2.98-7.55z" fill="#4285F4"/>
        <path d="M12 22c2.7 0 4.96-.9 6.62-2.43l-3.24-2.5c-.9.6-2.05.96-3.38.96-2.6 0-4.8-1.76-5.59-4.13H3.07v2.58A10 10 0 0 0 12 22z" fill="#34A853"/>
        <path d="M6.41 13.9A6.02 6.02 0 0 1 6.41 10.1V7.52H3.07a10 10 0 0 0 0 6.76l3.34-2.38z" fill="#FBBC05"/>
        <path d="M12 6.04c1.47 0 2.78.5 3.82 1.49l2.87-2.87C16.95 3.18 14.7 2 12 2A10 10 0 0 0 3.07 7.52l3.34 2.58C7.2 7.8 9.4 6.04 12 6.04z" fill="#EA4335"/>
      </svg>
      Continue with Gmail
    </button>

    <div class="auth-link-row">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
    <div class="auth-link-row" style="margin-top:8px">
      <a href="/">← Back to shop</a>
    </div>

   
  </div>
</main>

<div id="toast-container"></div>
<script>window.GOOGLE_CLIENT_ID = '__GOOGLE_CLIENT_ID__';</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
