<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – BuyNest</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">Buy<span>Nest</span></div>

    <div id="auth-error" class="auth-error hidden"></div>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Sign In
      </button>
    </form>

    <div style="display:flex;align-items:center;gap:10px;margin:18px 0 8px;color:var(--text-muted);font-size:.9rem;">
      <span style="flex:1;height:1px;background:rgba(148,163,184,.35)"></span>
    </div>

    <div style="display:flex;justify-content:center;margin-top:10px">
      <div id="gmail-login-btn" style="min-height:44px"></div>
    </div>
    <div id="google-status" style="margin-top:10px;text-align:center;color:var(--text-muted);font-size:.9rem"></div>

    <div class="auth-link-row">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
    <div class="auth-link-row" style="margin-top:8px">
      <a href="/">← Back to shop</a>
    </div>

   
  </div>
</main>

<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
